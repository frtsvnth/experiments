<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stickman Battle Royale</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #1a1a2e;
			font-family: 'Segoe UI', Tahoma, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
			color: #eee;
			overflow: hidden;
		}

		h1 {
			margin-top: 15px;
			font-size: 28px;
			color: #e94560;
			text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
			letter-spacing: 2px;
		}

		.controls {
			margin: 15px 0;
			display: flex;
			gap: 15px;
			align-items: center;
			z-index: 10;
		}

		.controls label {
			font-size: 16px;
			color: #ccc;
		}

		.controls input[type="range"] {
			width: 150px;
			accent-color: #e94560;
			cursor: pointer;
		}

		#countDisplay {
			font-weight: bold;
			color: #e94560;
			font-size: 18px;
			min-width: 20px;
			text-align: center;
		}

		button {
			padding: 10px 30px;
			font-size: 16px;
			font-weight: bold;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			transition: all 0.3s;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		#startBtn {
			background: linear-gradient(135deg, #e94560, #c23152);
			color: white;
			box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
		}

		#startBtn:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
		}

		#startBtn:disabled {
			background: #555;
			box-shadow: none;
			cursor: not-allowed;
			transform: none;
		}

		#resetBtn {
			background: linear-gradient(135deg, #0f3460, #16213e);
			color: #eee;
			border: 1px solid #e94560;
		}

		#resetBtn:hover {
			background: linear-gradient(135deg, #16213e, #0f3460);
		}

		canvas {
			border-radius: 12px;
			box-shadow: 0 0 40px rgba(233, 69, 96, 0.15);
			background: #16213e;
		}

		.winner-banner {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%) scale(0);
			background: rgba(0, 0, 0, 0.9);
			border: 3px solid #e94560;
			border-radius: 16px;
			padding: 30px 50px;
			text-align: center;
			z-index: 100;
			transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		}

		.winner-banner.show {
			transform: translate(-50%, -50%) scale(1);
		}

		.winner-banner h2 {
			font-size: 22px;
			color: #aaa;
			margin-bottom: 10px;
		}

		.winner-banner .winner-name {
			font-size: 32px;
			font-weight: bold;
			margin: 10px 0;
		}

		.winner-banner .winner-color-dot {
			display: inline-block;
			width: 20px;
			height: 20px;
			border-radius: 50%;
			vertical-align: middle;
			margin-right: 8px;
			border: 2px solid white;
		}

		.status-bar {
			margin-top: 10px;
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			justify-content: center;
			max-width: 800px;
		}

		.player-status {
			display: flex;
			align-items: center;
			gap: 5px;
			padding: 4px 10px;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.05);
			font-size: 13px;
			transition: all 0.3s;
		}

		.player-status.dead {
			opacity: 0.3;
			text-decoration: line-through;
		}

		.player-status .dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			border: 1px solid rgba(255, 255, 255, 0.3);
		}

		.player-status .hp-bar {
			width: 40px;
			height: 6px;
			background: #333;
			border-radius: 3px;
			overflow: hidden;
		}

		.player-status .hp-bar .fill {
			height: 100%;
			border-radius: 3px;
			transition: width 0.3s;
		}

		#aliveCount {
			font-size: 14px;
			color: #aaa;
			margin-top: 5px;
		}
	</style>
</head>

<body>
	<h1>⚔️ STICKMAN BATTLE ⚔️</h1>
	<div class="controls">
		<label>Бойцов: <input type="range" id="countSlider" min="5" max="10" value="6"> <span id="countDisplay">6</span></label>
		<button id="startBtn">СТАРТ</button>
		<button id="resetBtn">СБРОС</button>
	</div>
	<canvas id="arena" width="800" height="450"></canvas>
	<div id="aliveCount">Живых: 6</div>
	<div class="status-bar" id="statusBar"></div>
	<div class="winner-banner" id="winnerBanner">
		<h2>🏆 ПОБЕДИТЕЛЬ 🏆</h2>
		<div class="winner-name" id="winnerName"></div>
	</div>

	<script>
		const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const countSlider = document.getElementById('countSlider');
const countDisplay = document.getElementById('countDisplay');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const statusBar = document.getElementById('statusBar');
const aliveCountEl = document.getElementById('aliveCount');
const winnerBanner = document.getElementById('winnerBanner');
const winnerNameEl = document.getElementById('winnerName');

const FIGHT_CONFIG = {
  targetDurationSec: 15,
  baseHp: 200,
  baseDamage: 14,
  attackCooldown: 0.95,
  moveSpeed: 1.1,
  combatApproachDist: 65,
  combatRetreatDist: 30
};

const COLORS = ['#e94560', '#00d2ff', '#ffd700', '#ff6b35', '#a855f7', '#22c55e', '#f472b6', '#38bdf8', '#fb923c', '#4ade80'];
const NAMES = ['Рыжий', 'Ледяной', 'Золотой', 'Огненный', 'Тёмный', 'Зелёный', 'Розовый', 'Небесный', 'Янтарный', 'Изумрудный'];

// 🔧 Глобальные константы арены (были потеряны в прошлой версии)
const GROUND_Y = 380;
const ARENA_LEFT = 40;
const ARENA_RIGHT = 760;

let stickmen = [];
let particles = [];
let gameRunning = false;
let animFrame;
let currentWinner = null;
let battleEndTime = 0;
const POST_BATTLE_DELAY = 1200; // Пауза перед баннером (мс)

countSlider.addEventListener('input', () => countDisplay.textContent = countSlider.value);

class Stickman {
  constructor(id, x, color, name) {
    this.id = id; this.x = x; this.y = GROUND_Y;
    this.color = color; this.name = name;
    this.hp = FIGHT_CONFIG.baseHp; this.maxHp = this.hp;
    this.alive = true; this.target = null;
    this.state = 'idle'; this.stateTimer = 0;
    this.attackCooldown = Math.random() * 0.6;
    this.speed = FIGHT_CONFIG.moveSpeed + Math.random() * 0.5;
    this.damage = FIGHT_CONFIG.baseDamage + Math.floor(Math.random() * 4);
    this.facing = 1; this.animPhase = Math.random() * Math.PI * 2;
    this.hitAnim = 0; this.deathAnim = 0; this.attackType = 0;
    this.dodgeChance = 0.08 + Math.random() * 0.07; this.lastDodgeTime = 0;
  }

  findTarget() {
    let alive = stickmen.filter(s => s.alive && s.id !== this.id);
    if (alive.length === 0) { this.target = null; return; }
    let nearest = null, minDist = Infinity;
    for (let s of alive) { let d = Math.abs(s.x - this.x); if (d < minDist) { minDist = d; nearest = s; } }
    this.target = nearest;
  }

  update(dt) {
    if (!this.alive) { 
      if (this.deathAnim < 1) this.deathAnim = Math.min(1, this.deathAnim + dt * 1.5); 
      return; 
    }
    this.animPhase += dt * 5;
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.hitAnim > 0) this.hitAnim = Math.max(0, this.hitAnim - dt * 3);

    this.findTarget();
    if (!this.target || !this.target.alive) {
      if (stickmen.filter(s => s.alive).length <= 1) { this.state = 'victory'; return; }
      this.findTarget(); if (!this.target) return;
    }

    let dist = Math.abs(this.target.x - this.x);
    this.facing = this.target.x > this.x ? 1 : -1;

    if (this.state === 'attack') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) this.state = 'idle';
      if (this.stateTimer > 0.15 && this.stateTimer < 0.35 && dist < 60) {
        if (Math.random() > this.target.dodgeChance || Date.now() - this.target.lastDodgeTime < 1500) {
          this.target.takeDamage(this.damage, this);
        } else {
          this.target.lastDodgeTime = Date.now();
          spawnTextParticle(this.target.x, this.target.y - 70, 'MISS!', '#fff');
        }
      }
    } else if (this.state === 'hit') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) this.state = 'idle';
    } else {
      this.state = 'walk';
      if (dist > FIGHT_CONFIG.combatApproachDist) {
        this.x += this.facing * this.speed * 60 * dt;
      } else if (dist < FIGHT_CONFIG.combatRetreatDist) {
        this.x -= this.facing * this.speed * 35 * dt;
      } else if (this.attackCooldown <= 0) {
        this.attack();
      }
    }
    this.x = Math.max(ARENA_LEFT + 15, Math.min(ARENA_RIGHT - 15, this.x));
  }

  attack() {
    this.state = 'attack';
    this.stateTimer = 0.55;
    this.attackCooldown = FIGHT_CONFIG.attackCooldown + Math.random() * 0.3;
    this.attackType = Math.random() > 0.6 ? 1 : 0;
    this.x += this.facing * 22;
  }

  takeDamage(amount, attacker) {
    if (!this.alive) return;
    this.hp -= amount;
    this.state = 'hit'; this.stateTimer = 0.35;
    this.x -= (attacker.facing) * 28;
    spawnHitParticles(this.x, this.y - 35, this.color);
    if (this.hp <= 0) {
      this.hp = 0; this.alive = false; this.state = 'dead'; this.deathAnim = 0;
      spawnDeathParticles(this.x, this.y - 30, this.color);
    }
    updateStatusBar();
  }

  draw() {
    ctx.save();
    let alpha = this.alive ? 1 : Math.max(0, 1 - this.deathAnim);
    ctx.globalAlpha = alpha;
    let x = this.x, y = this.y;

    if (!this.alive) {
      let angle = this.deathAnim * Math.PI / 2 * (this.facing > 0 ? 1 : -1);
      ctx.translate(x, y); ctx.rotate(angle); ctx.translate(-x, -y);
    }

    let armOffset = 0, bodyLean = 0, bobY = 0, legOffset = 0;
    const headR = 12, bodyLen = 32, limbLen = 24, restAngle = 0.35;
    let strikeArmLen = limbLen, strikeThick = 4.5;

    if (this.state === 'walk' && this.alive) {
      bobY = Math.abs(Math.sin(this.animPhase * 2)) * 4;
      legOffset = Math.sin(this.animPhase * 2) * 0.45;
      armOffset = Math.sin(this.animPhase * 2) * 0.15;
    } else if (this.state === 'attack' && this.alive) {
      let t = 1 - (this.stateTimer / 0.55);
      if (t < 0.3) {
        armOffset = -1.8 * (t / 0.3);
        bodyLean = -this.facing * 0.12;
      } else {
        let strikeT = (t - 0.3) / 0.7;
        armOffset = -1.8 + 2.5 * strikeT;
        bodyLean = -this.facing * 0.12 + this.facing * 0.25 * strikeT;
        if (strikeT > 0.15 && strikeT < 0.75) {
          strikeArmLen = limbLen * 1.5;
          strikeThick = 6.5;
        }
      }
      if (this.attackType === 1) legOffset = 0.7 * Math.min(1, t * 2.5);
    } else if (this.state === 'hit' && this.alive) {
      let t = this.hitAnim;
      bodyLean = this.facing * 0.25 * t; armOffset = 0.4 * t; bobY = -7 * t;
    } else if (this.state === 'victory' && this.alive) {
      bobY = Math.sin(this.animPhase) * 6;
      armOffset = -2.4 + Math.sin(this.animPhase * 3) * 0.4;
    }

    ctx.translate(x, y + bobY);
    ctx.rotate(bodyLean);

    ctx.beginPath(); ctx.arc(0, -headR - bodyLen, headR, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.fill();

    ctx.fillStyle = '#111';
    let eyeOff = this.facing * 3;
    ctx.beginPath(); ctx.arc(eyeOff - 3, -bodyLen - headR - 2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeOff + 3, -bodyLen - headR - 2, 2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (this.state === 'hit') ctx.arc(eyeOff, -bodyLen-headR+4, 3, Math.PI, 0);
    else if (this.state === 'victory') ctx.arc(eyeOff, -bodyLen-headR+2, 4, 0, Math.PI);
    else ctx.arc(eyeOff, -bodyLen-headR+3, 2, 0, Math.PI);
    ctx.stroke();

    ctx.strokeStyle = this.color; ctx.lineWidth = 4.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -bodyLen + 8); ctx.lineTo(0, 0); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(0, 0);
    let llX = Math.sin(legOffset)*limbLen, llY = Math.cos(legOffset)*limbLen;
    ctx.lineTo(-llX, llY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0);
    let rlX = Math.sin(-legOffset)*limbLen, rlY = Math.cos(-legOffset)*limbLen;
    ctx.lineTo(-rlX, rlY); ctx.stroke();

    ctx.lineWidth = 4.5;
    let shoulderY = -bodyLen + 8;
    let trailArmAngle = this.facing > 0 ? -restAngle - armOffset : restAngle + armOffset;
    ctx.beginPath(); ctx.moveTo(0, shoulderY);
    ctx.lineTo(Math.sin(trailArmAngle)*limbLen, shoulderY + Math.cos(trailArmAngle)*limbLen); ctx.stroke();

    ctx.lineWidth = strikeThick;
    let leadArmAngle = this.facing > 0 ? restAngle + armOffset : -restAngle - armOffset;
    ctx.beginPath(); ctx.moveTo(0, shoulderY);
    ctx.lineTo(Math.sin(leadArmAngle)*strikeArmLen, shoulderY + Math.cos(leadArmAngle)*strikeArmLen); ctx.stroke();

    ctx.rotate(-bodyLean); ctx.globalAlpha = alpha;
    ctx.font = 'bold 15px Segoe UI'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
    ctx.fillText(this.name, 0, -bodyLen - headR - 35);
    ctx.shadowBlur = 0;

    if (this.alive) {
      let barW = 34, barH = 5, hpRatio = this.hp / this.maxHp;
      ctx.fillStyle = '#222'; ctx.fillRect(-barW/2, -bodyLen - headR - 25, barW, barH);
      ctx.fillStyle = hpRatio > 0.5 ? '#22c55e' : hpRatio > 0.25 ? '#eab308' : '#ef4444';
      ctx.fillRect(-barW/2, -bodyLen - headR - 25, barW * hpRatio, barH);
    }
    ctx.restore();
  }
}

function spawnHitParticles(x, y, color) {
  for (let i=0;i<10;i++) particles.push({x,y,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*7-3,life:1,color,size:3+Math.random()*4,type:'hit'});
  spawnTextParticle(x, y-25, `-${Math.floor(Math.random()*8+8)}`, '#ff5555');
}
function spawnDeathParticles(x, y, color) {
  for (let i=0;i<25;i++) particles.push({x,y,vx:(Math.random()-0.5)*12,vy:(Math.random()-1)*9,life:1.2,color,size:4+Math.random()*6,type:'death'});
  spawnTextParticle(x, y-40, '💀', '#fff');
}
function spawnTextParticle(x, y, text, color) {
  particles.push({x,y,vx:0,vy:-2,life:1.2,color,text,size:18,type:'text'});
}
function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=dt*1.8;
    if(p.type!=='text') p.vy+=0.15;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  for(let p of particles) {
    ctx.globalAlpha = Math.max(0,p.life);
    if(p.type==='text'){ctx.font=`bold ${p.size}px Segoe UI`;ctx.fillStyle=p.color;ctx.textAlign='center';ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(p.text,p.x,p.y);ctx.shadowBlur=0;}
    else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*Math.max(0,p.life),0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }
}
function drawArena() {
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#2a2a5e';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ARENA_LEFT,GROUND_Y+2);ctx.lineTo(ARENA_RIGHT,GROUND_Y+2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  for(let i=0;i<canvas.width;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
  for(let i=0;i<canvas.height;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();}
}
function updateStatusBar() {
  statusBar.innerHTML=''; let alive=0;
  for(let s of stickmen) {
    let div=document.createElement('div'); div.className='player-status'+(s.alive?'':' dead');
    let hpPct=(s.hp/s.maxHp*100), hpColor=hpPct>50?'#22c55e':hpPct>25?'#eab308':'#ef4444';
    div.innerHTML=`<span class="dot" style="background:${s.color}"></span><span>${s.name}</span><span class="hp-bar"><span class="fill" style="width:${hpPct}%;background:${hpColor}"></span></span><span>${Math.ceil(s.hp)}</span>`;
    statusBar.appendChild(div); if(s.alive) alive++;
  }
  aliveCountEl.textContent=`Живых: ${alive}`;
}

function initGame() {
  stickmen=[]; particles=[]; 
  currentWinner = null; battleEndTime = 0;
  winnerBanner.classList.remove('show');
  let count=parseInt(countSlider.value), spacing=(ARENA_RIGHT-ARENA_LEFT)/(count+1);
  for(let i=0;i<count;i++) stickmen.push(new Stickman(i,ARENA_LEFT+spacing*(i+1),COLORS[i],NAMES[i]));
  updateStatusBar(); startBtn.disabled=false;
}

function gameLoop() {
  let dt = 1/60;
  drawArena();

  if (gameRunning) {
    for (let s of stickmen) s.update(dt);
    updateParticles(dt);

    let aliveCount = stickmen.filter(s => s.alive).length;

    if (!currentWinner && aliveCount <= 1 && stickmen.length > 1) {
      currentWinner = stickmen.find(s => s.alive);
      if (currentWinner) {
        currentWinner.state = 'victory';
        battleEndTime = Date.now();
      }
    }

    if (currentWinner && Date.now() - battleEndTime > POST_BATTLE_DELAY) {
      gameRunning = false;
      winnerNameEl.innerHTML = `<span class="winner-color-dot" style="background:${currentWinner.color}"></span>${currentWinner.name}`;
      winnerNameEl.style.color = currentWinner.color;
      winnerBanner.classList.add('show');
    }
  }

  let sorted = [...stickmen].sort((a,b) => (a.alive?1:0)-(b.alive?1:0));
  for (let s of sorted) s.draw();
  drawParticles();

  for (let s of stickmen) {
    if (s.alive) {
      ctx.globalAlpha = 0.2; ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(s.x, GROUND_Y+2, 16, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  animFrame = requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click', () => {
  if (gameRunning) return;
  initGame();
  gameRunning = true;
  startBtn.disabled = true;
});

resetBtn.addEventListener('click', () => {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  initGame();
  drawArena();
  for (let s of stickmen) s.draw();
  animFrame = requestAnimationFrame(gameLoop);
});

initGame(); 
animFrame = requestAnimationFrame(gameLoop);
	</script>
</body>

</html>
